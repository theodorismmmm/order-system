<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bestellung verfolgen</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="page tracking-page">
    <div class="tracking-hero">
      <p class="eyebrow">Live-Status</p>
      <h1>Bestellung verfolgen</h1>
      <p class="muted">Gib deinen Tracking-Code ein, um den aktuellen Status deiner Bestellung zu sehen.</p>
      <div class="tracking-input-wrap">
        <label class="sr-only" for="orderInput">Tracking-Code</label>
        <input id="orderInput" class="tracking-input" placeholder="Tracking-Code eingeben" autocomplete="off" onkeydown="if(event.key==='Enter') trackOrder()">
        <button class="primary tracking-btn" onclick="trackOrder()">Verfolgen</button>
      </div>
    </div>

    <section id="result" class="stack"></section>
  </div>

  <script src="app.js"></script>
</body>
</html>
